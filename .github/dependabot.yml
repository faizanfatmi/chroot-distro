version: 2
updates:
    # Python dependencies (pyproject.toml)
    - package-ecosystem: "pip"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      commit-message:
          prefix: "deps"
          include: "scope"
      open-pull-requests-limit: 10

    # GitHub Actions versions
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
      commit-message:
          prefix: "ci"
          include: "scope"
      open-pull-requests-limit: 10
